name: RavenTube - YouTube Downloader with Search
//ass
on:
  workflow_dispatch:
    inputs:
      video_urls:
        description: '🔗 لینک یوتیوب / عبارت جستجو (چند تا با فاصله) | YouTube URL / search query (space separated)'
        required: true
        type: string
      quality:
        description: '🎬 کیفیت | Quality'
        required: false
        default: 'best'
        type: choice
        options:
          - best
          - 2160
          - 1440
          - 1080
          - 720
          - 480
          - audio
      download_subtitles:
        description: '📝 دانلود زیرنویس (فارسی + انگلیسی) | Download subtitles'
        required: false
        default: false
        type: boolean
      password:
        description: '🔒 رمز ZIP (اختیاری) | ZIP password (optional)'
        required: false
        default: ''
        type: string

jobs:
  download:
    name: "📥 RavenTube Downloader"
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write

    steps:
      - name: Check inputs
        run: |
          if [ -z "${{ github.event.inputs.video_urls }}" ]; then
            echo "❌ No input provided!"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global http.postBuffer 524288000
          git config --global http.maxRequestBuffer 100M
          git config --global core.compression 0
          git config user.name "RavenTube"
          git config user.email "raventube@github.com"

      - name: Start WARP Proxy
        run: |
          docker network create warp-net || true
          docker run -d \
            --name warp \
            --restart=always \
            --network warp-net \
            -p 1080:1080 \
            --cap-add NET_ADMIN \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            --sysctl net.ipv4.conf.all.src_valid_mark=1 \
            -v warp-data:/var/lib/cloudflare-warp \
            caomingjun/warp
          sleep 15
          for i in {1..5}; do
            curl -s --max-time 5 --socks5-hostname 127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace | grep -qE "warp=(on|plus)" && break
            sleep 5
          done

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip ffmpeg zip p7zip-full curl jq bc unzip
          curl -fsSL https://deno.land/install.sh | sh
          export DENO_INSTALL="$HOME/.deno"
          export PATH="$DENO_INSTALL/bin:$PATH"
          echo "$DENO_INSTALL/bin" >> $GITHUB_PATH
          pip3 install --upgrade yt-dlp

      - name: RavenTube - Download
        env:
          INPUT_URLS: ${{ github.event.inputs.video_urls }}
          QUALITY: ${{ github.event.inputs.quality }}
          ZIP_PASSWORD: ${{ github.event.inputs.password }}
          DOWNLOAD_SUBS: ${{ github.event.inputs.download_subtitles }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          BRANCH: ${{ github.ref_name }}
        run: |
          # === CONFIGURATION ===
          SPLIT_MB=95
          SPLIT_BYTES=$(( SPLIT_MB * 1024 * 1024 ))
          BACKUP_DIR="/tmp/raventube_$$"
          mkdir -p "$BACKUP_DIR" videos
          > /tmp/video_info.txt

          # === FORMAT SELECTION ===
          case "$QUALITY" in
            "audio") FORMAT="bestaudio/bestaudio*/best" ;;
            "best") FORMAT="bestvideo+bestaudio/bestvideo*+bestaudio*/best" ;;
            "2160") FORMAT="bestvideo[height<=2160]+bestaudio/bestvideo[height<=2160]*+bestaudio*/bestvideo+bestaudio/best" ;;
            "1440") FORMAT="bestvideo[height<=1440]+bestaudio/bestvideo[height<=1440]*+bestaudio*/bestvideo+bestaudio/best" ;;
            "1080") FORMAT="bestvideo[height<=1080]+bestaudio/bestvideo[height<=1080]*+bestaudio*/bestvideo+bestaudio/best" ;;
            "720")  FORMAT="bestvideo[height<=720]+bestaudio/bestvideo[height<=720]*+bestaudio*/bestvideo+bestaudio/best" ;;
            "480")  FORMAT="bestvideo[height<=480]+bestaudio/bestvideo[height<=480]*+bestaudio*/bestvideo+bestaudio/best" ;;
            *) FORMAT="bestvideo+bestaudio/bestvideo*+bestaudio*/best" ;;
          esac

          # === HELPERS ===
          sanitize() { echo "$1" | sed 's/ /-/g' | sed 's/　/-/g' | tr -s '-'; }
          urlencode() { python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1]))" "$1"; }
          
          get_unique_folder() {
            local NAME="$1"
            if [ ! -d "videos/$NAME" ] && [ ! -d "$BACKUP_DIR/$NAME" ]; then echo "$NAME"; return; fi
            echo "${NAME}_$(cat /dev/urandom | tr -dc 'a-z0-9' | fold -w 6 | head -1)"
          }

          # === SEARCH PARSER ===
          parse_input() {
            local INPUT="$1"
            if [[ "$INPUT" =~ ^(https?://)?(www\.)?(youtube\.com|youtu\.be)/ ]]; then
              echo "$INPUT"; return
            fi
            if [[ "$INPUT" =~ ^ytsearch[0-9]*: ]]; then
              echo "$INPUT"; return
            fi
            echo "ytsearch1:$INPUT"
          }

          # === DOWNLOAD FUNCTION ===
          download_video() {
            local METHOD=$1 URL=$2 TMP=$3
            if [ "$QUALITY" = "audio" ]; then
              FLAGS="--extract-audio --audio-format mp3 --audio-quality 0 --write-thumbnail --convert-thumbnails jpg"
            else
              FLAGS="--merge-output-format mp4 --write-thumbnail --convert-thumbnails jpg"
            fi
            FLAGS="$FLAGS --no-cache-dir --output ${TMP}/%(title)s.%(ext)s --no-part --no-playlist --retries 5 --fragment-retries 5 --concurrent-fragments 8 --progress"
            
            case $METHOD in
              1) yt-dlp --proxy "socks5://127.0.0.1:1080" --format "$FORMAT" $FLAGS --extractor-args "youtube:player_client=web" --js-runtimes deno --remote-components ejs:github "$URL" ;;
              2) yt-dlp --proxy "socks5://127.0.0.1:1080" --format "$FORMAT" $FLAGS --extractor-args "youtube:player_client=web" --js-runtimes deno --remote-components ejs:npm "$URL" ;;
              3) yt-dlp --proxy "socks5://127.0.0.1:1080" --format "$FORMAT" $FLAGS --extractor-args "youtube:player_client=web,mweb,android_vr" --js-runtimes deno --remote-components ejs:github "$URL" ;;
              4) yt-dlp --proxy "socks5://127.0.0.1:1080" --format "$FORMAT" $FLAGS --extractor-args "youtube:player_client=mweb" "$URL" ;;
              5) yt-dlp --proxy "socks5://127.0.0.1:1080" --format "$FORMAT" $FLAGS --extractor-args "youtube:player_client=android_vr" "$URL" ;;
              6) yt-dlp --format "$FORMAT" $FLAGS --extractor-args "youtube:player_client=web" --js-runtimes deno --remote-components ejs:github "$URL" ;;
              7) yt-dlp --format "$FORMAT" $FLAGS --extractor-args "youtube:player_client=mweb" "$URL" ;;
              8) yt-dlp --proxy "socks5://127.0.0.1:1080" --format "$FORMAT" $FLAGS --extractor-args "youtube:player_client=android" "$URL" ;;
            esac
          }

          # === COLLECT URLs (SEARCH + DIRECT) ===
          FINAL_URLS=()
          for RAW in $INPUT_URLS; do
            PARSED=$(parse_input "$RAW")
            if [[ "$PARSED" =~ ^ytsearch ]]; then
              echo "🔍 Searching: $RAW"
              VIDEO_IDS=$(yt-dlp --flat-playlist --print "%(id)s" "$PARSED" 2>/dev/null | head -10)
              for ID in $VIDEO_IDS; do
                FINAL_URLS+=("https://youtube.com/watch?v=$ID")
              done
            else
              FINAL_URLS+=("$PARSED")
            fi
          done

          TOTAL=${#FINAL_URLS[@]}
          echo "📊 Total videos to download: $TOTAL"

          # === MAIN DOWNLOAD LOOP ===
          URL_IDX=0
          for URL in "${FINAL_URLS[@]}"; do
            URL_IDX=$((URL_IDX + 1))
            echo "=========================================="
            echo "[$URL_IDX/$TOTAL] $URL"
            echo "=========================================="
            
            TMP_DIR="tmp_${URL_IDX}"
            mkdir -p "$TMP_DIR"
            SUCCESS=false
            
            for METHOD in 1 2 3 4 5 6 7 8; do
              if download_video $METHOD "$URL" "$TMP_DIR"; then
                SUCCESS=true; break
              fi
              sleep 3
            done
            
            [ "$SUCCESS" = false ] && { rm -rf "$TMP_DIR"; continue; }
            
            find "$TMP_DIR" -name "*.part" -delete
            for FILE in "$TMP_DIR"/*; do
              [ -f "$FILE" ] || continue
              [[ "$FILE" == *.jpg || "$FILE" == *.webp ]] && continue
              
              SIZE=$(stat -c%s "$FILE")
              BASENAME=$(basename "$FILE")
              NAME_NOEXT=$(sanitize "${BASENAME%.*}")
              EXT="${BASENAME##*.}"
              FOLDER=$(get_unique_folder "$NAME_NOEXT")
              mkdir -p "$BACKUP_DIR/$FOLDER"
              
              THUMB=$(ls "$TMP_DIR"/*.jpg 2>/dev/null | head -1)
              [ -n "$THUMB" ] && cp "$THUMB" "$BACKUP_DIR/$FOLDER/thumbnail.jpg"
              
              echo "$NAME_NOEXT|$FOLDER" >> /tmp/video_info.txt
              ENC_FOLDER=$(urlencode "$FOLDER")
              
              if [ "$SIZE" -gt "$SPLIT_BYTES" ]; then
                # Split into 95MB parts
                BASE="$BACKUP_DIR/$FOLDER/$FOLDER"
                if [ -n "$ZIP_PASSWORD" ]; then
                  7z a -tzip -v${SPLIT_MB}m -p"$ZIP_PASSWORD" -mx=0 "${BASE}.zip" "$FILE"
                else
                  zip -0 -s ${SPLIT_MB}m "${BASE}.zip" "$FILE"
                fi
                
                # Generate download links
                LINKS=""
                NUM=0
                for PART in $(ls "$BACKUP_DIR/$FOLDER/"*.zip "$BACKUP_DIR/$FOLDER/"*.z[0-9]* 2>/dev/null | sort -V); do
                  NUM=$((NUM+1))
                  PNAME=$(basename "$PART")
                  PENC=$(urlencode "$PNAME")
                  LINK="https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/videos/${ENC_FOLDER}/${PENC}"
                  LINKS="${LINKS}| ${NUM} | \`${PNAME}\` | [Download](${LINK}) |\n"
                done
                
                TOTAL_SIZE=$(du -sb "$BACKUP_DIR/$FOLDER" | cut -f1)
                TOTAL_MB=$(echo "scale=2; $TOTAL_SIZE / 1024 / 1024" | bc)
                
                cat > "$BACKUP_DIR/$FOLDER/README.md" << EOF
# ${NAME_NOEXT}

$( [ -f "$BACKUP_DIR/$FOLDER/thumbnail.jpg" ] && echo "<div align=\"center\"><img src=\"thumbnail.jpg\" width=\"250\"/></div><br>" )

| Property | Value |
|----------|-------|
| **Quality** | ${QUALITY} |
| **Total Size** | ${TOTAL_MB} MB (${NUM} parts) |
| **Password** | $( [ -n "$ZIP_PASSWORD" ] && echo "YES" || echo "NO" ) |

## Download Links

| # | File | Link |
|---|------|------|
${LINKS}

## How to Extract

Download all parts to the same folder, then open \`${FOLDER}.zip\`.

---
*RavenTube - Free YouTube Downloader*
EOF
              else
                # Small file - direct copy or single zip
                if [ -n "$ZIP_PASSWORD" ]; then
                  zip -0 -P "$ZIP_PASSWORD" "$BACKUP_DIR/$FOLDER/$FOLDER.zip" "$FILE"
                  FILENAME="$FOLDER.zip"
                else
                  cp "$FILE" "$BACKUP_DIR/$FOLDER/$FOLDER.$EXT"
                  FILENAME="$FOLDER.$EXT"
                fi
                
                SIZE_MB=$(echo "scale=2; $SIZE / 1024 / 1024" | bc)
                ENC_FILE=$(urlencode "$FILENAME")
                LINK="https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/videos/${ENC_FOLDER}/${ENC_FILE}"
                
                cat > "$BACKUP_DIR/$FOLDER/README.md" << EOF
# ${NAME_NOEXT}

$( [ -f "$BACKUP_DIR/$FOLDER/thumbnail.jpg" ] && echo "<div align=\"center\"><img src=\"thumbnail.jpg\" width=\"250\"/></div><br>" )

| Property | Value |
|----------|-------|
| **Quality** | ${QUALITY} |
| **Size** | ${SIZE_MB} MB |
| **Password** | $( [ -n "$ZIP_PASSWORD" ] && echo "YES" || echo "NO" ) |

## Download Link

| File | Link |
|------|------|
| \`${FILENAME}\` | [Download](${LINK}) |

---
*RavenTube - Free YouTube Downloader*
EOF
              fi
            done
            rm -rf "$TMP_DIR"
          done

          echo "$BACKUP_DIR" > /tmp/backup_path.txt
          echo "$REPO_OWNER" > /tmp/repo_owner.txt
          echo "$REPO_NAME" > /tmp/repo_name.txt
          echo "$BRANCH" > /tmp/branch.txt

      - name: Download Subtitles
        if: ${{ github.event.inputs.download_subtitles == 'true' }}
        run: |
          BACKUP_DIR=$(cat /tmp/backup_path.txt)
          REPO_OWNER=$(cat /tmp/repo_owner.txt)
          REPO_NAME=$(cat /tmp/repo_name.txt)
          BRANCH=$(cat /tmp/branch.txt)
          
          while IFS='|' read -r NAME FOLDER; do
            [ -z "$FOLDER" ] && continue
            SUB_DIR="$BACKUP_DIR/$FOLDER/subtitle"
            mkdir -p "$SUB_DIR"
            
            for METHOD in 1 2 3 4 5 6 7 8; do
              yt-dlp --proxy "socks5://127.0.0.1:1080" --write-sub --sub-langs fa,en --write-auto-sub --sub-langs en,fa --sub-format vtt --convert-subs vtt --skip-download --output "$SUB_DIR/%(title)s" "$URL" 2>/dev/null && break
              sleep 2
            done
            
            if [ -n "$(ls -A "$SUB_DIR" 2>/dev/null)" ]; then
              cd "$SUB_DIR" && zip -j "$BACKUP_DIR/$FOLDER/subtitle.zip" ./*
              rm -rf "$SUB_DIR"
              ENC_FOLDER=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$FOLDER'))")
              SUB_LINK="https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/videos/${ENC_FOLDER}/subtitle.zip"
              
              # Add subtitle section to README
              README="$BACKUP_DIR/$FOLDER/README.md"
              sed -i "/## Download Link/i\\
\\
## 📝 Subtitles\\
\\
| File | Link |\\
|------|------|\\
| \`subtitle.zip\` | [Download](${SUB_LINK}) |\\
" "$READMEME" 2>/dev/null || true
            fi
          done < /tmp/video_info.txt

      - name: Stop WARP
        if: always()
        run: docker stop warp || true

      - name: Push to Repository
        run: |
          BACKUP_DIR=$(cat /tmp/backup_path.txt)
          REPO_OWNER=$(cat /tmp/repo_owner.txt)
          REPO_NAME=$(cat /tmp/repo_name.txt)
          BRANCH=$(cat /tmp/branch.txt)
          
          [ -z "$(find "$BACKUP_DIR" -type f 2>/dev/null)" ] && { echo "No files downloaded"; exit 0; }
          
          git fetch origin "$BRANCH"
          git reset --hard origin/"$BRANCH"
          mkdir -p videos
          cp -r "$BACKUP_DIR"/* videos/
          
          # Generate master README
          {
            echo "# 📥 RavenTube - Downloaded Videos"
            echo ""
            echo "| # | Video |"
            echo "|---|-------|"
            NUM=0
            for folder in videos/*/; do
              [ -d "$folder" ] || continue
              NAME=$(basename "$folder")
              NUM=$((NUM+1))
              ENC=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$NAME'))")
              echo "| $NUM | [$NAME](https://github.com/${REPO_OWNER}/${REPO_NAME}/tree/${BRANCH}/videos/${ENC}) |"
            done
          } > videos/README.md
          
          git add -f videos/
          git diff --cached --quiet || git commit -m "RavenTube: downloaded videos [skip ci]"
          
          for i in {1..10}; do
            git push origin HEAD:"$BRANCH" && break || { sleep 5; git fetch origin "$BRANCH" && git reset --hard origin/"$BRANCH" && cp -r "$BACKUP_DIR"/* videos/ && git add -f videos/ && git commit -m "RavenTube: downloaded videos [skip ci]" --allow-empty; }
          done
          
          echo "✅ RavenTube completed successfully!"
