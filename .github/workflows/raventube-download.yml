name: RavenTube - Download

on:
  workflow_dispatch:
    inputs:
      video_urls:
        description: 'YouTube URLs (space separated) — leave empty to use latest search'
        required: false
        type: string
      quality:
        description: 'Quality'
        required: false
        default: 'best'
        type: choice
        options: [best, 2160, 1080, 720, 480, audio]
      download_subtitles:
        description: 'Download subtitles'
        required: false
        default: false
        type: boolean
      password:
        description: 'ZIP password'
        required: false
        default: ''
        type: string
      use_latest_search:
        description: 'Use URLs from latest search (filtered results only)'
        required: false
        default: true
        type: boolean
      max_videos:
        description: 'Maximum videos to download (0 = all)'
        required: false
        default: '0'
        type: string

jobs:
  download:
    name: Download and Store
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Get video URLs
        id: get_urls
        run: |
          if [ "${{ github.event.inputs.use_latest_search }}" = "true" ] && [ -f .raventube/latest_urls.txt ]; then
            MAX="${{ github.event.inputs.max_videos }}"
            if [ "$MAX" != "0" ]; then
              URLS=$(head -"$MAX" .raventube/latest_urls.txt | tr '\n' ' ')
            else
              URLS=$(cat .raventube/latest_urls.txt | tr '\n' ' ')
            fi
            echo "Using latest search results ($(echo $URLS | wc -w) videos):"
            echo "$URLS"
          elif [ -n "${{ github.event.inputs.video_urls }}" ]; then
            URLS="${{ github.event.inputs.video_urls }}"
          else
            echo "No URLs provided and no search results found."
            exit 1
          fi
          echo "urls=$URLS" >> $GITHUB_OUTPUT

      - name: Setup
        run: |
          git config user.name "RavenTube-Downloader"
          git config user.email "dl@raventube"
          sudo apt-get update
          sudo apt-get install -y python3-pip ffmpeg zip
          pip install yt-dlp

      - name: Download videos
        env:
          URLS: ${{ steps.get_urls.outputs.urls }}
          QUALITY: ${{ github.event.inputs.quality }}
          PASSWORD: ${{ github.event.inputs.password }}
        run: |
          if [ "$QUALITY" = "audio" ]; then
            FORMAT="bestaudio/best"
          elif [ "$QUALITY" = "best" ]; then
            FORMAT="bestvideo+bestaudio/best"
          else
            FORMAT="bestvideo[height<="${QUALITY}"]+bestaudio/best"
          fi

          mkdir -p videos
          mkdir -p download_log
          SUCCESS=0
          FAILED=0

          for URL in $URLS; do
            echo "Downloading: $URL"
            if yt-dlp -f "$FORMAT" \
              --merge-output-format mp4 \
              --write-thumbnail \
              --convert-thumbnails jpg \
              --output "videos/%(title)s.%(ext)s" \
              --no-playlist \
              --retries 5 \
              "$URL"; then
              SUCCESS=$((SUCCESS + 1))
              echo "$URL|SUCCESS" >> download_log/results.txt
            else
              FAILED=$((FAILED + 1))
              echo "$URL|FAILED" >> download_log/results.txt
            fi
          done

          echo "✅ Downloaded: $SUCCESS | ❌ Failed: $FAILED"

          # Password protect
          if [ -n "$PASSWORD" ]; then
            for file in videos/*.mp4 videos/*.webm; do
              [ -f "$file" ] || continue
              zip -P "$PASSWORD" "${file}.zip" "$file"
              rm "$file"
            done
          fi

      - name: Push to repository
        run: |
          git add videos/ download_log/
          git diff --cached --quiet || git commit -m "RavenTube: downloaded videos ($SUCCESS success, $FAILED failed) [skip ci]"
          git push
