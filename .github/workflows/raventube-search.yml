name: RavenTube - Advanced Search (HTML Output)

on:
  workflow_dispatch:
    inputs:
      search_query:
        description: 'Search phrase (e.g., "python tutorial")'
        required: true
        type: string
      max_results:
        description: 'Maximum results'
        required: false
        default: '10'
        type: choice
        options: [5, 10, 20, 30, 50]
      sort_by:
        description: 'Sort by'
        required: false
        default: 'relevance'
        type: choice
        options: [relevance, upload_date, view_count, like_count, duration]
      publish_time:
        description: 'Upload date filter'
        required: false
        default: 'any'
        type: choice
        options: [any, today, this_week, this_month, this_year]

jobs:
  html_search:
    name: Search & Generate HTML Report
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip
          pip install yt-dlp

      - name: Search and generate HTML
        env:
          QUERY: ${{ github.event.inputs.search_query }}
          MAX: ${{ github.event.inputs.max_results }}
          SORT: ${{ github.event.inputs.sort_by }}
          TIME: ${{ github.event.inputs.publish_time }}
        run: |
          FILTERS=""
          case "$TIME" in
            today) FILTERS=":today" ;;
            this_week) FILTERS=":week" ;;
            this_month) FILTERS=":month" ;;
            this_year) FILTERS=":year" ;;
          esac
          SORT_FLAG=""
          if [ "$SORT" != "relevance" ]; then
            SORT_FLAG=":sort=$SORT"
          fi
          yt-dlp --dump-json --no-playlist --skip-download --no-warnings --no-check-certificate "ytsearch${MAX}:${QUERY}${FILTERS}${SORT_FLAG}" > raw.json

          cat > build.py << 'PYEOF'
import json, os

query = os.environ["QUERY"]
now = os.popen("date -u '+%Y-%m-%d %H:%M UTC'").read().strip()
rows = ""

with open("raw.json") as f:
    for i, line in enumerate(f, 1):
        v = json.loads(line.strip())
        title = v.get("title","?")
        dur = int(v.get("duration") or 0)
        views = int(v.get("view_count") or 0)
        date = (v.get("upload_date") or "")[:10]
        url = v.get("webpage_url") or f"https://youtu.be/{v.get('id','')}"
        rows += f'<tr><td>{i}</td><td><a href="{url}">{title}</a></td><td>{date}</td><td>{views:,}</td><td>{dur//60}:{dur%60:02d}</td></tr>\n'

html = f'''<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>RavenTube: {query}</title>
<style>body{{font:14px/1.4 monospace;background:#111;color:#ccc;padding:20px}}h1{{color:#4ecdc4}}table{{border-collapse:collapse;width:100%}}th,td{{border:1px solid #333;padding:6px 10px;text-align:left}}th{{background:#222}}a{{color:#ff6b6b}}</style></head><body>
<h1>RavenTube: {query}</h1><p>{now} — {i} results</p>
<table><tr><th>#</th><th>Title</th><th>Date</th><th>Views</th><th>Dur</th></tr>{rows}</table></body></html>'''

with open("index.html","w") as f: f.write(html)

urls = [l.split('"')[3] for l in rows.splitlines() if 'href=' in l]
with open("urls.txt","w") as f: f.write("\n".join(urls))
PYEOF

          python3 build.py

      - name: Save to repository
        run: |
          mkdir -p .raventube
          cp index.html .raventube/latest.html
          cp urls.txt .raventube/urls.txt
          git config user.name "RavenTube"
          git config user.email "rt@git.io"
          git add .raventube/ index.html urls.txt
          git diff --cached --quiet || git commit -m "Search: $QUERY [skip ci]"
          git push
        env:
          QUERY: ${{ github.event.inputs.search_query }}

      - name: Summary
        run: |
          echo "=========================================="
          echo "Done: https://github.com/${{ github.repository }}/blob/main/index.html"
          echo "=========================================="
